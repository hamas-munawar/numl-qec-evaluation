<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NUML QEC Evaluation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup/popup.css" />
  </head>
  <body>

    <!-- ══ HEADER ═══════════════════════════════════════════ -->
    <header class="header">
      <img src="images/numl-logo.png" alt="NUML Logo" class="logo" />
      <div class="header-copy">
        <span class="header-title">NUML QEC</span>
        <span class="header-sub">Quality Evaluation Assistant</span>
      </div>
      <span class="version-tag">v2.0</span>
    </header>

    <main class="main">

      <!-- ══ STEP 1 ══════════════════════════════════════════ -->
      <div class="step-block">
        <div class="step-label">
          <span class="step-num">1</span>
          Choose Your Rating
        </div>
        <select id="rating-selector" class="select">
          <option value="best">⭐ Excellent — Best (5)</option>
          <option value="good">⭐ Very Good — Good (4)</option>
          <option value="average">⭐ Satisfactory — Average (3)</option>
          <option value="bad">⭐ Below Average — Bad (2)</option>
          <option value="worst">⭐ Poor — Worst (1)</option>
        </select>
      </div>

      <!-- ══ STEP 2 ══════════════════════════════════════════ -->
      <div class="step-block">
        <div class="step-label">
          <span class="step-num">2</span>
          Select Evaluation Type
        </div>

        <!-- Teacher Card -->
        <div class="eval-card" id="card-teacher">
          <div class="card-header">
            <div class="card-icon teacher-icon">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg>
            </div>
            <div class="card-title-group">
              <span class="card-title">Teacher Evaluation</span>
              <span class="card-desc">Rate your instructor's performance</span>
            </div>
          </div>
          <div class="card-actions">
            <button id="fill-t" class="btn btn-ghost">Fill Only</button>
            <button id="sub-t"  class="btn btn-primary">Fill &amp; Submit</button>
          </div>
          <button id="sub-all-t" class="btn btn-full btn-teacher">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1 8a.5.5 0 01.5-.5h11.793L10.146 4.354a.5.5 0 11.708-.708l4 4a.5.5 0 010 .708l-4 4a.5.5 0 01-.708-.708L13.293 8.5H1.5A.5.5 0 011 8z" clip-rule="evenodd"/></svg>
            Submit All Teacher Evaluations
          </button>
        </div>

        <!-- Course Card -->
        <div class="eval-card" id="card-course">
          <div class="card-header">
            <div class="card-icon course-icon">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
            </div>
            <div class="card-title-group">
              <span class="card-title">Course Evaluation</span>
              <span class="card-desc">Rate the course content &amp; structure</span>
            </div>
          </div>
          <div class="card-actions">
            <button id="fill-s" class="btn btn-ghost">Fill Only</button>
            <button id="sub-s"  class="btn btn-primary">Fill &amp; Submit</button>
          </div>
          <button id="sub-all-s" class="btn btn-full btn-course">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1 8a.5.5 0 01.5-.5h11.793L10.146 4.354a.5.5 0 11.708-.708l4 4a.5.5 0 010 .708l-4 4a.5.5 0 01-.708-.708L13.293 8.5H1.5A.5.5 0 011 8z" clip-rule="evenodd"/></svg>
            Submit All Course Evaluations
          </button>
        </div>
      </div>

      <!-- ══ STEP 3 ══════════════════════════════════════════ -->
      <div class="step-block">
        <div class="step-label">
          <span class="step-num">3</span>
          Complete All at Once
        </div>
        <button id="fill-all" class="btn btn-full btn-complete">
          <svg class="btn-icon-lg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
          Fill &amp; Submit All Evaluations
          <span class="badge-all">Teachers + Courses</span>
        </button>
      </div>

      <!-- ══ LOG ════════════════════════════════════════════ -->
      <div class="log-block">
        <div class="log-title-row">
          <span class="log-title">Activity Log</span>
          <span class="log-status-dot" id="status-dot"></span>
        </div>
        <div id="log" class="log">Ready — select a rating and choose an action above.</div>
      </div>

    </main>

    <script type="module" src="src/controller.js"></script>
  </body>
</html>
